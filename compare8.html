<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#e8e1d4;font-family:'Caveat',cursive;color:#1a1612;overflow:hidden;height:100vh;display:flex;flex-direction:column}

<script>
function P(){ try{ if(howl){ const s=howl.seek(),d=howl.duration(); if(typeof s==='number'&&d>0) return Math.min(1,Math.max(0,s/d)); } }catch(e){} return 0; }
function fmt(s){ if(!isFinite(s)||s<0)return '0:00'; return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0'); }

// ── 2D движок ──
currentTrack={n:8};
function size2d(){ resizeCanvas(); }
window.addEventListener('resize',()=>{ size2d(); fit3d(); });
size2d(); animRunning=true; head();
const kl=(typeof parseLRC==='function'&&KARAOKE[8])?parseLRC(KARAOKE[8]):[];
const lyricEl=document.getElementById('lyric');

// ── общий звук ──
const playBtn=document.getElementById('play'),scrub=document.getElementById('scrub'),tcur=document.getElementById('tcur'),ttot=document.getElementById('ttot');
let started=false;
playBtn.addEventListener('click',()=>{ if(!started){started=true;currentTrack={n:8};playAudio(8);animRunning=true;} else if(howl){ howl.playing()?howl.pause():howl.play(); } });
let seeking=false;
scrub.addEventListener('input',()=>{ seeking=true; if(howl&&howl.duration()) howl.seek(scrub.value/1000*howl.duration()); });
scrub.addEventListener('change',()=>{ seeking=false; });
setInterval(()=>{ if(!howl)return; const d=howl.duration()||0,s=howl.seek()||0; if(d>0){ if(!seeking)scrub.value=s/d*1000; tcur.textContent=fmt(s); ttot.textContent=fmt(d); } playBtn.textContent=howl.playing()?'⏸':'▶'; let cur=''; for(const l of kl){ if(l.time<=s)cur=l.text; else break; } lyricEl.textContent=cur; },150);

// ════════════════════════════════════════════════════════════════════════
//  3D (three.js) — детальная версия: лица-текстуры, волосы/руки/ноги, тени, glow
// ════════════════════════════════════════════════════════════════════════
const gl=document.getElementById('gl3d');
const renderer=new THREE.WebGLRenderer({canvas:gl,antialias:true});
renderer.setClearColor(0xeae3d6,1); renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(46,1,0.1,300);
function fit3d(){ const pp=document.getElementById('panel3d'),w=pp.clientWidth,h=pp.clientHeight; renderer.setSize(w,h,false); camera.aspect=w/h; camera.updateProjectionMatrix(); }

const gcv=document.createElement('canvas'); gcv.width=4; gcv.height=1; const g2=gcv.getContext('2d');
['#4a3f34','#8a7563','#c4b39e','#efe8db'].forEach((c,i)=>{g2.fillStyle=c;g2.fillRect(i,0,1,1);});
const grad=new THREE.CanvasTexture(gcv); grad.minFilter=THREE.NearestFilter; grad.magFilter=THREE.NearestFilter;
const toon=c=>new THREE.MeshToonMaterial({color:c,gradientMap:grad});
function outline(m,k){ const o=new THREE.Mesh(m.geometry,new THREE.MeshBasicMaterial({color:0x1a1612,side:THREE.BackSide})); o.scale.multiplyScalar(k); m.add(o); }
function solid(geo,c,k,parent,sh){ const m=new THREE.Mesh(geo,toon(c)); outline(m,k||1.05); if(sh!==false)m.castShadow=true; (parent||scene).add(m); return m; }

// glow-спрайт (имитация bloom)
const glowCv=document.createElement('canvas'); glowCv.width=glowCv.height=64; const gx=glowCv.getContext('2d');
const gg=gx.createRadialGradient(32,32,2,32,32,32); gg.addColorStop(0,'rgba(255,255,255,1)'); gg.addColorStop(0.4,'rgba(255,220,150,.6)'); gg.addColorStop(1,'rgba(255,200,120,0)');
gx.fillStyle=gg; gx.fillRect(0,0,64,64); const glowTex=new THREE.CanvasTexture(glowCv);
function glow(x,y,z,size,color,parent){ const s=new THREE.Sprite(new THREE.SpriteMaterial({map:glowTex,color:color||0xffcc77,blending:THREE.AdditiveBlending,transparent:true,depthWrite:false})); s.position.set(x,y,z); s.scale.setScalar(size); (parent||scene).add(s); return s; }

// карандашные лица
function faceTex(kind){
  const c=document.createElement('canvas'); c.width=c.height=128; const x=c.getContext('2d');
  x.fillStyle='#efe8db'; x.fillRect(0,0,128,128); x.strokeStyle='#1a1612'; x.fillStyle='#1a1612'; x.lineWidth=4; x.lineCap='round';
  if(kind==='x'){ x.lineWidth=5; x.strokeStyle='#962e2e'; x.beginPath(); x.moveTo(40,50);x.lineTo(56,66); x.moveTo(56,50);x.lineTo(40,66); x.moveTo(72,50);x.lineTo(88,66); x.moveTo(88,50);x.lineTo(72,66); x.stroke(); return new THREE.CanvasTexture(c); }
  x.beginPath(); x.arc(48,58,5,0,7); x.arc(80,58,5,0,7); x.fill();
  x.beginPath(); x.moveTo(40,46); x.lineTo(56,44); x.moveTo(72,44); x.lineTo(88,46); x.stroke();
  x.beginPath();
  if(kind==='happy') x.arc(64,74,16,0.15*Math.PI,0.85*Math.PI);
  else if(kind==='sad') x.arc(64,96,16,1.15*Math.PI,1.85*Math.PI);
  else x.arc(64,74,15,0.2*Math.PI,0.8*Math.PI);
  x.stroke();
  if(kind==='fem'){ x.fillStyle='rgba(184,106,122,.5)'; x.beginPath(); x.arc(40,70,7,0,7); x.arc(88,70,7,0,7); x.fill(); }
  return new THREE.CanvasTexture(c);
}
const FT={happy:faceTex('happy'),sad:faceTex('sad'),fem:faceTex('fem'),x:faceTex('x')};

function person(x,z,shirt,pants,fem){
  const g=new THREE.Group(); g.position.set(x,0,z); scene.add(g);
  [-0.32,0.32].forEach(dx=>{ const l=solid(new THREE.CylinderGeometry(0.26,0.22,1.5,12),pants,1.05,g); l.position.set(dx,-0.65,0); const ft=solid(new THREE.BoxGeometry(0.5,0.22,0.7),0x3a2f25,1.05,g); ft.position.set(dx,-1.45,0.18); });
  solid(new THREE.CylinderGeometry(0.5,0.62,1.5,16),shirt,1.04,g).position.set(0,0.5,0);
  [[-0.62,0.55],[0.62,-0.55]].forEach(a=>{ const arm=solid(new THREE.CylinderGeometry(0.16,0.16,1.3,10),shirt,1.06,g); arm.position.set(a[0],0.55,0.05); arm.rotation.z=a[1]; const hand=solid(new THREE.SphereGeometry(0.2,12,12),0xe9dcc8,1.06,g); hand.position.set(a[0]*1.7,0.0,0.12); });
  const head=solid(new THREE.SphereGeometry(0.62,20,20),0xe9dcc8,1.06,g); head.position.set(0,1.85,0); head.scale.set(1,1.1,1);
  const face=new THREE.Mesh(new THREE.PlaneGeometry(0.95,0.95),new THREE.MeshBasicMaterial({map:fem?FT.fem:FT.happy,transparent:true})); face.position.set(0,1.9,0.6); g.add(face);
  if(fem){ const h=solid(new THREE.SphereGeometry(0.72,18,18),0x4a3a2c,1.03,g); h.position.set(0,2.0,-0.08); h.scale.set(1.05,1.0,1.15); const back=solid(new THREE.CylinderGeometry(0.5,0.35,1.1,12),0x4a3a2c,1.03,g); back.position.set(0,1.3,-0.45); }
  else { const h=solid(new THREE.SphereGeometry(0.66,16,16),0x2f261c,1.03,g); h.position.set(0,2.12,-0.05); h.scale.set(1.02,0.62,1.05); }
  g.userData={head,face};
  return g;
}
function setFace(g,kind){ g.userData.face.material.map=FT[kind]; g.userData.face.material.needsUpdate=true; }

function paperTex(){ const c=document.createElement('canvas'); c.width=c.height=128; const x=c.getContext('2d'); x.fillStyle='#ece5d8'; x.fillRect(0,0,128,128); x.strokeStyle='rgba(150,130,100,.25)'; x.lineWidth=1.5; for(let i=8;i<128;i+=18){x.beginPath();x.moveTo(i,0);x.lineTo(i,128);x.stroke();} const t=new THREE.CanvasTexture(c); t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(6,3); return t; }

// ── КОМНАТА ──
const room=new THREE.Group(); scene.add(room);
const floor=new THREE.Mesh(new THREE.BoxGeometry(26,0.5,16),toon(0xd8cdb8)); floor.position.set(0,-2.4,0); floor.receiveShadow=true; room.add(floor);
const rug=new THREE.Mesh(new THREE.CylinderGeometry(3.6,3.6,0.06,28),toon(0xb86a5a)); rug.position.set(0,-2.1,1.5); rug.receiveShadow=true; room.add(rug);
const wall=new THREE.Mesh(new THREE.BoxGeometry(26,15,0.5),new THREE.MeshToonMaterial({map:paperTex(),gradientMap:grad})); wall.position.set(0,4.5,-7.5); wall.receiveShadow=true; room.add(wall);
solid(new THREE.BoxGeometry(0.5,15,16),0xe2dac9,1.005,room,false).position.set(-12.5,4.5,0);
solid(new THREE.BoxGeometry(4.6,4.6,0.4),0x2b2b2b,1.04,room).position.set(5,4.5,-7.2);
const pane=new THREE.Mesh(new THREE.PlaneGeometry(3.8,3.8),new THREE.MeshBasicMaterial({color:0xffce82})); pane.position.set(5,4.5,-7); room.add(pane);
glow(5,4.5,-6.5,7,0xffce82,room);
const photo=solid(new THREE.BoxGeometry(2.2,2.6,0.2),0x3a2f25,1.04,room); photo.position.set(-5,5,-7.2);
const pc=document.createElement('canvas'); pc.width=pc.height=128; const ppx=pc.getContext('2d'); ppx.fillStyle='#efe8db'; ppx.fillRect(0,0,128,128); ppx.strokeStyle='#1a1612'; ppx.fillStyle='#1a1612'; ppx.lineWidth=3;
[44,84].forEach(cx=>{ ppx.beginPath(); ppx.arc(cx,54,16,0,7); ppx.stroke(); ppx.beginPath(); ppx.arc(cx-5,50,2,0,7); ppx.arc(cx+5,50,2,0,7); ppx.fill(); ppx.beginPath(); ppx.arc(cx,56,7,0.1*Math.PI,0.9*Math.PI); ppx.stroke(); });
ppx.fillStyle='#b8220e'; ppx.beginPath(); ppx.moveTo(64,86); ppx.bezierCurveTo(54,78,58,72,64,80); ppx.bezierCurveTo(70,72,74,78,64,86); ppx.fill();
const photoTex=new THREE.CanvasTexture(pc);
const pimg=new THREE.Mesh(new THREE.PlaneGeometry(1.7,2),new THREE.MeshBasicMaterial({map:photoTex})); pimg.position.set(-5,5,-7.08); room.add(pimg);
const crack=new THREE.Group(); room.add(crack); crack.position.set(-5,5,-7.0); crack.visible=false;
for(let i=0;i<7;i++){ const a=Math.random()*6.28,len=0.5+Math.random()*0.8; const m=new THREE.Mesh(new THREE.CylinderGeometry(0.02,0.02,len,4),new THREE.MeshBasicMaterial({color:0x962e2e})); m.position.set(Math.cos(a)*len*0.4,Math.sin(a)*len*0.4,0.06); m.rotation.z=a; crack.add(m); }
solid(new THREE.BoxGeometry(2,2.8,0.12),0x9a8f7a,1.03,room).position.set(-9,5.2,-7.2);
solid(new THREE.BoxGeometry(6.2,0.4,3.2),0xb79b78,1.03,room).position.set(0,-0.1,1.2);
[[-2.8,0.4],[2.8,0.4],[-2.8,2],[2.8,2]].forEach(p=>solid(new THREE.CylinderGeometry(0.16,0.16,2.2,8),0x8a7158,1.06,room).position.set(p[0],-1.3,p[1]));
[-0.8,0.8].forEach(dx=>solid(new THREE.CylinderGeometry(0.2,0.26,1,12),0x3a5a3a,1.05,room).position.set(dx,0.6,1.4));
const candle=new THREE.Mesh(new THREE.SphereGeometry(0.14,10,10),new THREE.MeshBasicMaterial({color:0xffdd88})); candle.position.set(0,0.55,1.9); room.add(candle); glow(0,0.6,1.9,1.6,0xffcc66,room);
solid(new THREE.CylinderGeometry(0.07,0.07,0.5,8),0xe8e0d0,1.05,room).position.set(0,0.2,1.9);
const bulb=new THREE.Mesh(new THREE.SphereGeometry(0.32,14,14),new THREE.MeshBasicMaterial({color:0xffe6a0})); bulb.position.set(0,5.6,1.5); room.add(bulb); const bulbGlow=glow(0,5.6,1.5,3.2,0xffd980,room);
solid(new THREE.CylinderGeometry(0.025,0.025,3.4,6),0x1a1612,1.0,room,false).position.set(0,7.4,1.5);
const male=person(-1.9,1.4,0x5a6e82,0x39424d,false);
const fem=person(1.9,1.4,0xb86a7a,0x6a4a55,true); room.add(male,fem);

// ── ПОЕЗД ──
const train=new THREE.Group(); scene.add(train); train.visible=false;
solid(new THREE.BoxGeometry(46,0.4,1.4),0x6a5a48,1.0,train).position.set(0,-2,2);
const car=new THREE.Group(); train.add(car);
solid(new THREE.BoxGeometry(7,3.2,2.6),0x7a6a86,1.02,car).position.set(0,0,0);
solid(new THREE.BoxGeometry(7.4,0.5,2.8),0x5a4a66,1.02,car).position.set(0,1.7,0);
[-2.2,2.2].forEach(x=>{ const w=solid(new THREE.CylinderGeometry(0.6,0.6,0.5,14),0x2b2b2b,1.05,car); w.position.set(x,-1.8,0); w.rotation.x=Math.PI/2; });
for(let i=0;i<3;i++){ const wm=new THREE.Mesh(new THREE.PlaneGeometry(1.4,1.4),new THREE.MeshBasicMaterial({color:0xffce82})); wm.position.set(-2.1+i*2.1,0.3,1.32); car.add(wm); glow(-2.1+i*2.1,0.3,1.5,2.2,0xffce82,car); }
const cityBoxes=[]; for(let i=0;i<11;i++){ const h=4+Math.random()*9; const b=solid(new THREE.BoxGeometry(2.6,h,2.6),0xcfc6b6,1.01,train); b.position.set(-22+i*4.5,h/2-2,-9); cityBoxes.push(b); }

// ── ПЛАТФОРМА + МАМА ──
const platform=new THREE.Group(); scene.add(platform); platform.visible=false;
solid(new THREE.BoxGeometry(12,0.6,4),0xcabfae,1.01,platform).position.set(0,-2,0);
const mama=person(3,0,0x8a6a6a,0x5a4444,true); platform.add(mama); mama.scale.setScalar(0.95); setFace(mama,'sad');
const mamaGlow=glow(3,2,1,0,0xffcc77,platform);

// свет
scene.add(new THREE.AmbientLight(0xfff0d8,0.7));
const dir=new THREE.DirectionalLight(0xffffff,0.85); dir.position.set(-7,12,7); dir.castShadow=true; dir.shadow.mapSize.set(1024,1024); dir.shadow.camera.left=-16;dir.shadow.camera.right=16;dir.shadow.camera.top=16;dir.shadow.camera.bottom=-16; scene.add(dir);
const warm=new THREE.PointLight(0xffcc77,1.3,26); warm.position.set(0,5.4,1.5); scene.add(warm);
const winL=new THREE.PointLight(0xffce82,0.8,22); winL.position.set(5,4.5,-5); scene.add(winL);

const flash3d=document.getElementById('flash3d'),mamaText=document.getElementById('mamaText');
const camPos=new THREE.Vector3(0,3.2,11),_look=new THREE.Vector3(0,1.4,0),camLook=new THREE.Vector3(0,1.4,0);
let tt=0,femDown=false;
function lerp(a,b,k){return a+(b-a)*k;}

function update3D(p){
  tt+=0.016;
  male.position.y=Math.sin(tt*1.6)*0.05; male.rotation.z=Math.sin(tt*0.8)*0.02; male.userData.head.rotation.z=Math.sin(tt*1.2)*0.05;
  bulb.position.x=Math.sin(tt*0.6)*0.3; warm.position.x=bulb.position.x; bulbGlow.position.x=bulb.position.x;
  candle.scale.setScalar(1+Math.sin(tt*7)*0.12);
  let shake=0,flashA=0,mamaA=0;

  if(p<0.30){
    room.visible=true; train.visible=false; platform.visible=false; fem.visible=true; femDown=false;
    warm.intensity=1.3; dir.intensity=0.85;
    setFace(male,'happy'); setFace(fem,'fem');
    fem.rotation.z=Math.sin(tt*0.8+1)*0.02; fem.position.set(1.9,Math.sin(tt*1.6+1)*0.05,1.4); fem.userData.head.rotation.z=Math.sin(tt*1.2+1)*0.05;
    crack.visible=false; photo.rotation.z=0;
    camPos.set(Math.sin(tt*0.18)*4.5,3.2+Math.sin(tt*0.3)*0.25,11+Math.cos(tt*0.18)*1.2); _look.set(0,1.4,0);
  } else if(p<0.42){
    room.visible=true; train.visible=false; platform.visible=false; fem.visible=true;
    const k=(p-0.30)/0.12; setFace(fem, k>0.5?'x':'sad'); setFace(male,'sad');
    fem.rotation.z=-k*1.5; fem.position.set(1.9-k*1.0,lerp(0.0,-1.5,k),1.4);
    crack.visible=true; crack.scale.setScalar(0.2+k); photo.rotation.z=k*0.12;
    shake=Math.max(0,1-k*4)*0.5; flashA=Math.max(0,0.55-k*3); warm.intensity=1.3-k*0.6;
    camPos.set(2.6,2.4,7.6); _look.set(1.4,0.2,1);
  } else if(p<0.62){
    room.visible=true; train.visible=false; platform.visible=false; fem.visible=false; setFace(male,'sad');
    warm.intensity=0.5; dir.intensity=0.4;
    camPos.set(lerp(-1,-3,(p-0.42)/0.2),1.9,6.8); _look.set(-1.9,0.6,1.4);
  } else if(p<0.86){
    room.visible=false; train.visible=true; platform.visible=false; fem.visible=true;
    dir.intensity=0.8;
    const k=(p-0.62)/0.24; cityBoxes.forEach((b,i)=>{ b.position.x=((-22+i*4.5-k*46)%49.5+49.5)%49.5-24; }); car.position.y=Math.sin(tt*3)*0.12;
    camPos.set(-8+Math.sin(tt*0.3),1.6,9.5); _look.set(0,0.2,2);
  } else {
    room.visible=false; train.visible=true; platform.visible=true;
    const k=(p-0.86)/0.14; mamaGlow.scale.setScalar(6); mamaA=Math.min(1,k*2); mama.position.y=Math.sin(tt*1.4)*0.05;
    camPos.set(lerp(-8,1.5,k),1.7,lerp(9.5,7,k)); _look.set(3,1,0);
  }
  camera.position.lerp(camPos,0.08); camera.position.x+=(Math.random()-0.5)*shake; camera.position.y+=(Math.random()-0.5)*shake;
  camLook.lerp(_look,0.08); camera.lookAt(camLook);
  flash3d.style.opacity=flashA; mamaText.style.opacity=mamaA;
}
function loop(){ requestAnimationFrame(loop); update3D(P()); renderer.render(scene,camera); }
fit3d(); loop();
window.__CMP8=true;
setTimeout(()=>{ if(!window.__errs.length) document.title='CMP8_OK'; },1500);
</script>
